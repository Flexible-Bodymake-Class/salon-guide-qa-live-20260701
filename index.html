  header .eyebrow {
    position: relative;
    font-size: 11px;
    letter-spacing: 3px;

    margin-bottom: 10px;
  }
  header h1 {
    position: relative;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  header .sub {
    position: relative;
    margin-top: 10px;
    font-size: 13px;
    color: var(--gray-text);
  }
  header .stats {
    position: relative;
    margin-top: 18px;
    display: flex;
    justify-content: center;
    gap: 28px;
  }
  header .stat .num {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 26px;
    color: var(--coral-deep);
  }
  header .stat .label {
    font-size: 11px;
    color: var(--gray-text);
    letter-spacing: 1px;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ===== Controls ===== */
  .search-wrap { margin-bottom: 18px; }
  .search-wrap input {
    width: 100%;
    padding: 13px 18px;
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    outline: none;
    color: var(--charcoal);
  }
  .search-wrap input:focus { border-color: var(--coral); }
  .search-wrap input::placeholder { color: #B8B2AC; }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .tag {
    padding: 6px 16px;
    font-size: 12px;
    border: 1px solid var(--coral);
    border-radius: 999px;
    background: var(--card);
    color: var(--coral-deep);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .tag:hover { background: var(--coral-light); }
  .tag.active {
    background: var(--coral);
    color: #fff;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .toolbar .count { font-size: 12px; color: var(--gray-text); }
  .toolbar button {
    font-size: 12px;
    padding: 6px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    color: var(--gray-text);
    cursor: pointer;
    margin-left: 8px;
  }
  .toolbar button:hover { border-color: var(--coral); color: var(--coral-deep); }

  /* ===== Sections & Cards ===== */
  .section { margin-bottom: 32px; }
  .section-title {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
    padding-left: 4px;
  }
  .section-title h2 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 18px;
    font-weight: 600;
  }
  .section-title .en {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--coral);
  }
  .section-title::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--coral);
    border-radius: 2px;
    align-self: center;
  }

  .qa-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.03);
  }
  .qa-q {
    display: flex;
    gap: 12px;
    padding: 15px 18px;
    cursor: pointer;
    align-items: flex-start;
  }
  .qa-q:hover { background: var(--coral-light); }
  .qa-q .q-mark {
    flex-shrink: 0;
    font-family: "Hiragino Mincho ProN", serif;
    font-size: 15px;
    color: var(--coral-deep);
    font-weight: 600;
    line-height: 1.6;
  }
  .qa-q .q-text { font-size: 14px; font-weight: 600; flex: 1; }
  .qa-q .arrow {
    flex-shrink: 0;
    width: 8px; height: 8px;
    border-right: 1.5px solid var(--coral);
    border-bottom: 1.5px solid var(--coral);
    transform: rotate(45deg);
    margin-top: 7px;
    transition: transform .2s;
  }
  .qa-card.open .arrow { transform: rotate(-135deg); margin-top: 10px; }
  .qa-a {
    display: none;
    padding: 0 18px 16px 18px;
  }
  .qa-card.open .qa-a { display: block; }
  .qa-a .a-inner {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    background: var(--beige);
    border-radius: 8px;
  }
  .qa-a .a-mark {
    flex-shrink: 0;
    font-family: "Hiragino Mincho ProN", serif;
    font-size: 15px;
    color: var(--gray-text);
    font-weight: 600;
  }
  .qa-a .a-text { font-size: 13.5px; color: #4A4642; }

  .hidden { display: none !important; }

  .no-result {
    text-align: center;
    padding: 50px 0;
    color: var(--gray-text);
    font-size: 14px;
  }

  /* ===== Footer flow ===== */
  .flow {
    margin-top: 44px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 22px;
  }
  .flow h3 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 16px;
    text-align: center;
    margin-bottom: 18px;
  }
  .flow ol { list-style: none; counter-reset: step; }
  .flow li {
    counter-increment: step;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 13.5px;
  }
  .flow li:last-child { border-bottom: none; }
  .flow li::before {
    content: counter(step);
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--coral);
    color: #fff;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Hiragino Mincho ProN", serif;
  }
  footer {
    text-align: center;
    padding: 30px 0 40px;
    font-size: 11px;
    color: #B8B2AC;
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 19px; }
    header .stats { gap: 20px; }
    .qa-q .q-text { font-size: 13.5px; }
  }
</style>

// ===== render =====
const sectionsEl = document.getElementById('sections');
const tagsEl = document.getElementById('tags');
let activeCat = null;

function render() {
  sectionsEl.innerHTML = '';
  const kw = document.getElementById('search').value.trim().toLowerCase();
  let shown = 0;

  DATA.forEach((sec, si) => {
    if (activeCat !== null && activeCat !== si) return;
    const items = sec.items.filter(it =>
      !kw || it.q.toLowerCase().includes(kw) || it.a.toLowerCase().includes(kw));
    if (!items.length) return;
    shown += items.length;

    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = '<div class="section-title"><h2>' + sec.cat + '</h2><span class="en">' + sec.en + '</span></div>';
    items.forEach(it => {
      const card = document.createElement('div');
      card.className = 'qa-card';
      card.innerHTML =
        '<div class="qa-q"><span class="q-mark">Q.</span><span class="q-text">' + it.q + '</span><span class="arrow"></span></div>' +
        '<div class="qa-a"><div class="a-inner"><span class="a-mark">A.</span><span class="a-text">' + it.a + '</span></div></div>';
      card.querySelector('.qa-q').addEventListener('click', () => card.classList.toggle('open'));
      div.appendChild(card);
    });
    sectionsEl.appendChild(div);
  });

  document.getElementById('count').textContent = shown + '件の質問を表示中';
  document.getElementById('noResult').classList.toggle('hidden', shown > 0);
}

function toggleAll(open) {
  document.querySelectorAll('.qa-card').forEach(c => c.classList.toggle('open', open));
}

// tags
const allTag = document.createElement('div');
allTag.className = 'tag active';
allTag.textContent = 'すべて';
allTag.onclick = () => { activeCat = null; setActive(allTag); render(); };
tagsEl.appendChild(allTag);

DATA.forEach((sec, i) => {
  const t = document.createElement('div');
  t.className = 'tag';
  t.textContent = sec.cat;
  t.onclick = () => { activeCat = i; setActive(t); render(); };
  tagsEl.appendChild(t);
});

function setActive(el) {
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

document.getElementById('search').addEventListener('input', render);

// stats
document.getElementById('statQ').textContent = DATA.reduce((s, c) => s + c.items.length, 0);
document.getElementById('statC').textContent = DATA.length;

render();
</script>
